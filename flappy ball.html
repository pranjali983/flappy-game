<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flappy Ball</title>
<style>
  body {
    margin: 0;
    background: #70c5ce;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: Arial, sans-serif;
  }
  canvas {
    background: linear-gradient(#70c5ce, #c2e9fb);
    border-radius: 10px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }
  #ui {
    margin-top: 10px;
    font-size: 20px;
    font-weight: bold;
    color: #fff;
    text-shadow: 1px 1px 2px #000;
  }
  #restart {
    margin-top: 8px;
    padding: 8px 14px;
    border: none;
    background: #ff9800;
    color: #fff;
    font-size: 16px;
    border-radius: 6px;
    cursor: pointer;
  }
</style>
</head>
<body>
<canvas id="game" width="320" height="480"></canvas>
<div id="ui">Score: 0</div>
<button id="restart">Restart</button>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('ui');
const restartBtn = document.getElementById('restart');

let ball, pipes, gravity, score, gameOver, loop;

function init() {
  ball = {x: 80, y: 200, r: 15, vy: 0};
  pipes = [];
  gravity = 0.25;
  score = 0;
  gameOver = false;
  scoreEl.textContent = `Score: ${score}`;
  clearInterval(loop);
  loop = setInterval(update, 1000/60);
}

function flap() {
  if (!gameOver) ball.vy = -6;
}

function spawnPipe() {
  const gap = 120;
  const top = Math.random() * 200 + 50;
  pipes.push({x: canvas.width, top, gap, passed: false});
}

function update() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Ball physics
  ball.vy += gravity;
  ball.y += ball.vy;
  ctx.fillStyle = '#ffeb3b';
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2);
  ctx.fill();

  // Spawn pipes
  if (pipes.length === 0 || pipes[pipes.length-1].x < canvas.width - 180) spawnPipe();

  // Draw pipes
  ctx.fillStyle = '#4caf50';
  pipes.forEach((p, i) => {
    p.x -= 2;
    ctx.fillRect(p.x, 0, 50, p.top);
    ctx.fillRect(p.x, p.top + p.gap, 50, canvas.height);

    // Score
    if (!p.passed && p.x + 50 < ball.x) {
      score++;
      p.passed = true;
      scoreEl.textContent = `Score: ${score}`;
    }

    // Collision
    if (
      ball.x + ball.r > p.x && ball.x - ball.r < p.x + 50 &&
      (ball.y - ball.r < p.top || ball.y + ball.r > p.top + p.gap)
    ) endGame();

    // Remove off-screen
    if (p.x + 50 < 0) pipes.splice(i, 1);
  });

  // Ground/ceiling collision
  if (ball.y + ball.r > canvas.height || ball.y - ball.r < 0) endGame();
}

function endGame() {
  gameOver = true;
  clearInterval(loop);
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#fff';
  ctx.font = '28px Arial';
  ctx.textAlign = 'center';
  ctx.fillText('Game Over', canvas.width/2, canvas.height/2);
}

document.addEventListener('keydown', e => {
  if (e.code === 'Space') flap();
});
canvas.addEventListener('click', flap);
canvas.addEventListener('touchstart', flap);
restartBtn.addEventListener('click', init);

init();
</script>
</body>
</html>
